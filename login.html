<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Trans Line Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-image: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
        }

        .login-container {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .logo-section {
            justify-content: center;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--color-text-muted);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--border-radius-md);
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            font-size: 14px;
            outline: none;
            transition: var(--transition-fast);
        }

        .input-group input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--border-radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
        }

        .error-msg {
            color: var(--color-negative);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo-section" style="display:flex;">
            <div class="logo-icon">T</div>
            <div class="logo-text">Trans Line</div>
        </div>
        <h2 style="margin-bottom: 8px;">Добро пожаловать</h2>
        <p style="color: var(--color-text-muted); font-size: 14px; margin-bottom: 24px;">Войдите в панель управления</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Логин (admin)</label>
                <input type="text" id="username" placeholder="Введите логин" required>
            </div>
            <div class="input-group">
                <label>Пароль (12345)</label>
                <input type="password" id="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn-login">Войти</button>
            <div id="errorMsg" class="error-msg">Неверный логин или пароль</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('auth_token', data.token);
                    window.location.href = '/';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = data.error || 'Ошибка входа';
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Ошибка соединения с сервером';
            }
        });
    </script>
</body>

</html>
